<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; margin: 0; padding: 0; overflow: hidden; z-index: 999999; background: #000;">
      <embed src="{{ '/pdf/resume.pdf' | relative_url }}" type="application/pdf" style="width: 100%; height: 100%; border: none;">
    </div>
    <div style="position: fixed; bottom: 12px; right: 16px; z-index: 9999999; background: #0d1117; padding: 6px 12px; border-radius: 6px; opacity: 0.7; border: 1px solid #30363d;">
      <a href="{{ '/pdf/resume.pdf' | relative_url }}" download style="color: #c9d1d9; text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px;">⬇ Download PDF</a>
    </div>
  </body>
</html>
