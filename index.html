<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FunDarkResume</title>
  <link rel="preload" href="/pdfjs/build/pdf.min.js" as="script">
  <link rel="preload" href="/pdf/resume.pdf" as="fetch" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { perspective: 1200px; font-family: system-ui, sans-serif; position: fixed; top: 0; left: 0; }

    #bg-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2; display: block; pointer-events: none;
      will-change: transform; opacity: 0;
      transition: opacity 0.8s;
    }
    #bg-canvas.active { opacity: 0.25; }

    #entrainment-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
      background: white; opacity: 0;
      will-change: opacity; mix-blend-mode: overlay;
      contain: strict;
    }

    #cloud { position: relative; width: 100vw; height: 100vh; overflow: visible; }

    #ring {
      position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      transform-origin: center center; isolation: isolate; will-change: transform;
      animation: none;
    }
    #ring.active { animation: ringRotate 2s linear infinite; }
    body.alignment #ring.active { animation: ringRotate 20s linear infinite; }
    body.action #ring.active { animation: ringRotate 0.5s linear infinite; }

    @keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #ring::after {
      content: '';
      position: fixed; top: 50%; left: 50%;
      width: 20px; height: 20px; border-radius: 50%;
      background: #000; box-shadow: 0 0 150px #000, 0 0 300px rgba(0,0,0,0.9);
      opacity: 0; pointer-events: none; z-index: 1;
      transform: translate(-50%, -50%) scale(0.1);
      animation: none;
    }
    #ring.active::after {
      animation: ringBurstEnvelope var(--env-dur, 2s) ease-in-out infinite,
                 ringStrobe var(--strobe-dur, 0.5s) step-start infinite;
    }

    @keyframes ringBurstEnvelope {
      0%, 75.37% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
      75.37% { opacity: 1; transform: translate(-50%, -50%) scale(150); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(200); }
    }

    @keyframes ringStrobe {
      0%, 49.9% { visibility: visible; }
      50%, 99.9% { visibility: hidden; }
      100% { visibility: visible; }
    }

    .floating-page {
      position: absolute; cursor: pointer; will-change: transform;
      background: transparent; transform-style: preserve-3d;
      backface-visibility: hidden; border-radius: 4px;
      opacity: 0; transition: opacity 0.5s;
    }
    .floating-page.canvas-loaded { opacity: 1; }

    .floating-page canvas {
      display: block; width: 100%; height: 100%; border-radius: 4px;
      background: #000; transform-origin: center center; image-rendering: crisp-edges;
      box-shadow: 0 20px 40px rgba(0,0,0,0.95); will-change: transform, box-shadow;
    }

    body.receptive .floating-page canvas {
      animation: slowSpin 33s linear infinite, squarePulse 0.1667s linear infinite, thumbStrobe 0.1667s step-start infinite;
    }
    body.alignment .floating-page canvas {
      animation: slowSpin 33s linear infinite, squarePulse 0.1667s linear infinite, thumbStrobe 2s step-start infinite;
    }
    body.action .floating-page canvas {
      animation: slowSpin 33s linear infinite, squarePulse 0.0278s linear infinite, thumbStrobe 0.0278s step-start infinite;
    }

    body.receptive .floating-page.spotlight canvas {
      animation: fastSpin 33s linear infinite, whiteFlicker 0.1667s step-start infinite, thumbStrobeTwo 0.1667s step-start infinite !important;
    }
    body.alignment .floating-page.spotlight canvas {
      animation: fastSpin 33s linear infinite, goldFlicker 0.1667s step-start infinite, thumbStrobeTwo 0.1667s step-start infinite !important;
    }
    body.action .floating-page.spotlight canvas {
      animation: fastSpin 33s linear infinite, greenFlicker 0.0278s step-start infinite, thumbStrobeTwo 0.0278s step-start infinite !important;
    }

    body.receptive .floating-page.color-pass canvas {
      animation: slowSpin 33s linear infinite, whitePassGlow 2s ease-in-out infinite, thumbStrobe 0.1667s step-start infinite;
    }
    body.alignment .floating-page.color-pass canvas {
      animation: slowSpin 33s linear infinite, goldPassGlow 2s ease-in-out infinite, thumbStrobe 0.1667s step-start infinite;
    }
    body.action .floating-page.color-pass canvas {
      animation: slowSpin 33s linear infinite, greenPassGlow 0.5s ease-in-out infinite, thumbStrobe 0.0278s step-start infinite;
    }

    .flipper { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s ease-in-out; }
    .flipped .flipper { transform: rotateY(180deg); }

    @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fastSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @keyframes squarePulse {
      0%, 49.9% { box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 80px #fff, 0 0 150px rgba(255,255,255,0.8); }
      50%, 99.9% { box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 80px #000, 0 0 150px rgba(0,0,0,0.95); }
      100% { box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 80px #fff, 0 0 150px rgba(255,255,255,0.8); }
    }

    @keyframes whiteFlicker { 0%,49.9%{box-shadow:0 20px 40px #000,0 0 120px #FFF,0 0 225px rgba(255,255,255,.95)} 50%,99.9%{box-shadow:0 20px 40px #000,0 0 120px #FEFEFE,0 0 225px rgba(254,254,254,.8)} 100%{box-shadow:0 20px 40px #000,0 0 120px #FFF,0 0 225px rgba(255,255,255,.95)} }
    @keyframes goldFlicker { 0%,49.9%{box-shadow:0 20px 40px #000,0 0 120px #FFD700,0 0 225px rgba(255,215,0,.95)} 50%,99.9%{box-shadow:0 20px 40px #000,0 0 120px #FFC000,0 0 225px rgba(255,192,0,.8)} 100%{box-shadow:0 20px 40px #000,0 0 120px #FFD700,0 0 225px rgba(255,215,0,.95)} }
    @keyframes greenFlicker { 0%,49.9%{box-shadow:0 20px 40px #000,0 0 120px #0F0,0 0 225px rgba(0,255,0,.95)} 50%,99.9%{box-shadow:0 20px 40px #000,0 0 120px #0E0,0 0 225px rgba(0,238,0,.8)} 100%{box-shadow:0 20px 40px #000,0 0 120px #0F0,0 0 225px rgba(0,255,0,.95)} }

    @keyframes thumbStrobe { 0%,49.9%{opacity:1} 50%,99.9%{opacity:.75} 100%{opacity:1} }
    @keyframes thumbStrobeTwo { 0%,49.9%{opacity:.5} 50%,99.9%{opacity:.75} 100%{opacity:.5} }

    @keyframes whitePassGlow { 0%,100%{box-shadow:0 20px 40px #000,0 0 100px rgba(255,255,255,.5),0 0 200px rgba(255,255,255,.4)} 50%{box-shadow:0 20px 40px #000,0 0 150px rgba(255,255,255,.7),0 0 300px rgba(255,255,255,.5)} }
    @keyframes goldPassGlow { 0%,100%{box-shadow:0 20px 40px #000,0 0 100px rgba(255,215,0,.5),0 0 200px rgba(255,215,0,.4)} 50%{box-shadow:0 20px 40px #000,0 0 150px rgba(255,215,0,.7),0 0 300px rgba(255,215,0,.5)} }
    @keyframes greenPassGlow { 0%,100%{box-shadow:0 20px 40px #000,0 0 100px rgba(0,255,0,.5),0 0 200px rgba(0,255,0,.4)} 50%{box-shadow:0 20px 40px #000,0 0 150px rgba(0,255,0,.7),0 0 300px rgba(0,255,0,.5)} }

    #overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
      z-index:1000; display:none; justify-content:center; align-items:center;
      cursor:zoom-out; overflow:visible; pointer-events:auto;
    }

    #glow-wrapper { position:relative; display:inline-block; max-width:95vw; max-height:95vh; }

    #glow-wrapper::after {
      content:''; position:absolute; top:50%; left:50%; width:100%; height:100%;
      background:transparent; pointer-events:none; z-index:-2; transform:translate(-50%,-50%);
      will-change:box-shadow,opacity; opacity:0; transition:opacity .2s;
    }

    #glow-wrapper.dream-active::after {
      opacity:var(--sparkle-opacity,0);
      box-shadow:0 0 4000px rgba(255,255,255,.95),0 0 2400px #fff,0 0 6000px rgba(255,255,255,.8);
    }

    #glow-wrapper::before {
      content:''; position:absolute; top:50%; left:50%; width:100%; height:100%;
      background:transparent; pointer-events:none; z-index:-1; transform:translate(-50%,-50%);
      will-change:box-shadow,background,opacity; opacity:0; transition:opacity .2s;
    }

    #glow-wrapper.dream-active::before {
      opacity:1;
      animation:glowBurstEnvelope var(--env-dur,2s) ease-in-out infinite;
    }

    @keyframes glowBurstEnvelope {
      0%,75.37%{opacity:0} 75.37%{opacity:1} 100%{opacity:0}
    }

    #overlay canvas {
      max-width:95vw; max-height:95vh; border-radius:6px;
      cursor:default; background:#000; box-shadow:none;
      position:relative; z-index:2;
    }

    /* ── Fullscreen Invitation with Atomic Whirl Canvas ── */
    #fullscreen-invite {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 20%, #0a0106, #000000);
      z-index: 5000; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      cursor: pointer; text-align: center;
      user-select: none;
    }
    #atomic-canvas {
      position: absolute;
      width: min(80vw, 80vh);
      height: min(80vw, 80vh);
      pointer-events: none;
      z-index: 1;
    }
    .haiku-center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2.2rem;
      letter-spacing: 1px;
      background: transparent;
      padding: 1.5rem 2rem;
      border-radius: 20px;
    }
    .invite-line {
      opacity: 0;
      transition: opacity 1.2s ease;
      margin: 8px 0;
    }
    .line1 { color: #FFFFFF; }
    .line2 { color: #FFD700; }
    .line3 { color: #00FF00; }

    /* ── Eye Symbol ── */
    #eye-symbol {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      width: 160px; height: 160px; z-index:0;
      cursor:pointer; opacity: 0; pointer-events: none;
    }
    #eye-symbol.active { opacity: 1; pointer-events: auto; }
    #eye-symbol svg { display: block; width: 100%; height: 100%; }

    /* Glow ring motion */
    .glow-ring {
      transform-origin: center;
      animation: spinGlow 10s linear infinite;
    }
    @keyframes spinGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

  <script>
    window.PDFJS_LOCAL = true;

    // ── Atomic Whirl Canvas Animation ──
    (function() {
      const canvas = document.getElementById('atomic-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = 600;
      canvas.width = size;
      canvas.height = size;
      const center = { x: size/2, y: size/2 };
      const orbits = [
        { a: 140, b: 92, tilt: 0.2, speed: 0.012, electrons: 3, lineColor: 'rgba(121, 11, 62, 0.55)', electronColor: '#D86196' },
        { a: 180, b: 125, tilt: 0.85, speed: -0.008, electrons: 4, lineColor: 'rgba(146, 30, 80, 0.5)', electronColor: '#E272A4' },
        { a: 220, b: 160, tilt: 1.45, speed: 0.006, electrons: 5, lineColor: 'rgba(106, 8, 52, 0.6)', electronColor: '#F097B8' },
        { a: 265, b: 195, tilt: 2.2, speed: -0.005, electrons: 6, lineColor: 'rgba(160, 35, 90, 0.45)', electronColor: '#FFB3D0' }
      ];
      for (let orbit of orbits) {
        orbit.electronsAngles = [];
        orbit.prevPositions = [];
        for (let i = 0; i < orbit.electrons; i++) {
          orbit.electronsAngles.push((i / orbit.electrons) * Math.PI * 2);
          orbit.prevPositions.push([]);
        }
      }

      const dustParticles = [];
      const dustPalette = ["#9C2D62", "#B53A73", "#D26A98", "#F0A2C3", "#FFC0D0"];
      for (let i = 0; i < 180; i++) {
        dustParticles.push({
          angle: Math.random() * Math.PI * 2,
          radius: 30 + Math.random() * 110,
          speed: 0.02 + Math.random() * 0.03,
          size: 1.5 + Math.random() * 3,
          alpha: 0.3 + Math.random() * 0.5,
          color: dustPalette[Math.floor(Math.random() * dustPalette.length)]
        });
      }

      function getEllipsePoint(cx, cy, a, b, tilt, angleRad) {
        const x_ell = a * Math.cos(angleRad);
        const y_ell = b * Math.sin(angleRad);
        const cosT = Math.cos(tilt);
        const sinT = Math.sin(tilt);
        return {
          x: cx + x_ell * cosT - y_ell * sinT,
          y: cy + x_ell * sinT + y_ell * cosT
        };
      }

      function drawNucleus() {
        const grad = ctx.createRadialGradient(center.x, center.y, 5, center.x, center.y, 32);
        grad.addColorStop(0, '#790B3E');
        grad.addColorStop(0.7, '#A62C60');
        grad.addColorStop(1, '#F27BAE');
        ctx.beginPath();
        ctx.arc(center.x, center.y, 18, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      function drawOrbitPath(orbit) {
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(center.x, center.y, orbit.a, orbit.b, orbit.tilt, 0, Math.PI * 2);
        ctx.strokeStyle = orbit.lineColor;
        ctx.lineWidth = 1.8;
        ctx.setLineDash([8, 12]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawElectron(x, y, color, size, trail) {
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        if (trail && trail.length > 1) {
          for (let i = 0; i < trail.length; i++) {
            const t = trail[i];
            ctx.beginPath();
            ctx.arc(t.x, t.y, size * 0.7, 0, Math.PI*2);
            ctx.fillStyle = `rgba(210, 100, 150, ${0.2 * (1 - i / trail.length)})`;
            ctx.fill();
          }
        }
      }

      function updateElectrons(orbit, dtFactor) {
        const step = orbit.speed * 0.8 * dtFactor;

          } else { numPal = null; }
        }
        if (now - lastTime >= interval) {
          lastTime = now;
          if (currentPhase === 'receptive') drawReceptive();
          else drawPalette(numPal);
        }
      }
      let resizeTimeout;
      addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 16); });
      resize();
      requestAnimationFrame(tick);
    }

    // ── PDF ritual ──
    function startPDFRitual() {
      (async function() {
        function wait(cb) { if (typeof pdfjsLib !== 'undefined') cb(); else setTimeout(()=>wait(cb), 50); }
        wait(async () => {
          pdfjsLib.GlobalWorkerOptions.workerSrc = window.PDFJS_LOCAL ? '/pdfjs/build/pdf.worker.min.js' : 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const pdf = await pdfjsLib.getDocument('/pdf/resume.pdf').promise;
          const pages = pdf.numPages;
          const ringEl = document.getElementById('ring');
          const overlay = document.getElementById('overlay');
          const glow = document.getElementById('glow-wrapper');
          const expC = document.getElementById('expanded-canvas');
          const COPIES = 33, SCALE = 0.35, STAGGER = 167;
          const pageData = [], all = [];
          function posOnCircle(el, idx, total, w, h) {
            const a = idx / total * 2 * Math.PI - Math.PI / 2 - (total - 1) / total * 2 * Math.PI;
            const r = Math.min(innerWidth, innerHeight) * 0.4;
            el.style.left = (Math.cos(a) * r - w / 2) + 'px';
            el.style.top  = (Math.sin(a) * r - h / 2) + 'px';
          }
          for (let p = 1; p <= pages; p++) {
            const page = await pdf.getPage(p);
            const vp = page.getViewport({ scale: SCALE }), orig = page.getViewport({ scale: 2.0 });
            const tc = document.createElement('canvas'); tc.width = vp.width; tc.height = vp.height;
            await page.render({ canvasContext: tc.getContext('2d'), viewport: vp }).promise;
            pageData[p] = { page, viewport: orig, thumbCanvas: tc, thumbWidth: vp.width, thumbHeight: vp.height };
          }
          let idx = 0, totalCopies = pages * COPIES;
          for (let p = 1; p <= pages; p++) {
            const { thumbCanvas, thumbWidth, thumbHeight } = pageData[p];
            for (let c = 0; c < COPIES; c++) {
              const floater = document.createElement('div'); floater.className = 'floating-page';
              const cc = document.createElement('canvas'); cc.width = thumbWidth; cc.height = thumbHeight;
              cc.getContext('2d').drawImage(thumbCanvas, 0, 0);
              const flipper = document.createElement('div'); flipper.className = 'flipper';
              flipper.appendChild(cc); floater.appendChild(flipper);
              floater.style.width = thumbWidth + 'px'; floater.style.height = thumbHeight + 'px';
              floater.style.left = '-9999px'; floater.style.top = '-9999px';
              const rx = (Math.random() - 0.5) * 8, ry = (Math.random() - 0.5) * 8, rz = (Math.random() - 0.5) * 6;
              floater.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg) translateZ(${Math.random() * 30}px)`;
              floater.dataset.page = p; floater.dataset.index = idx;

              let z = 10;
              if (idx < 11) z = 20 + idx; else if (idx < 22) z = 30 + (idx - 11); else z = 40 + (idx - 22);
              floater.style.zIndex = z;
              if (idx === 11) floater.style.zIndex = 25; if (idx === 22) floater.style.zIndex = 35;
              if (idx === 10 || idx === 21 || idx === 32) { floater.classList.add('spotlight'); floater.style.zIndex = 200; }

              floater.addEventListener('click', async (e) => {
                e.stopPropagation();
                const { page, viewport } = pageData[parseInt(floater.dataset.page)];
                expC.width = viewport.width; expC.height = viewport.height;
                const ctx = expC.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                overlay.style.display = 'flex'; glow.classList.add('dream-active');
                if (window.setPdfOpen) window.setPdfOpen(true);
              });

              ringEl.appendChild(floater);
              all.push({ element: floater, flipper, index: idx, width: thumbWidth, height: thumbHeight });
              setTimeout((el, i, w, h) => posOnCircle(el, i, totalCopies, w, h), idx * STAGGER, floater, idx, thumbWidth, thumbHeight);
              setTimeout(() => floater.classList.add('canvas-loaded'), idx * STAGGER + 200);
              idx++;
            }
          }

          const skip = new Set([10, 21, 32]);
          const eligible = all.map((_, i) => i).filter(i => !skip.has(i));
          const sizes = [2, 4, 5]; let gi = 0, pos = 0;
          function applyColorPass() {
            eligible.forEach(i => all[i].element.classList.remove('color-pass'));
            const sz = sizes[gi], grp = [];
            for (let i = 0; i < sz; i++) grp.push(eligible[(pos + i) % eligible.length]);
            grp.forEach(i => all[i].element.classList.add('color-pass'));
            pos = (pos + sz) % eligible.length; gi = (gi + 1) % sizes.length;
          }
          setTimeout(() => { applyColorPass(); setInterval(applyColorPass, 8000); }, totalCopies * STAGGER + 2000);

          function flip() { all.forEach(item => item.element.classList.toggle('flipped')); }
          setTimeout(() => { flip(); setInterval(flip, 2000); }, totalCopies * STAGGER + 3000);

          addEventListener('resize', () => all.forEach(({ element, index, width, height }) => posOnCircle(element, index, totalCopies, width, height)));
          overlay.addEventListener('click', () => { overlay.style.display = 'none'; glow.classList.remove('dream-active'); if (window.setPdfOpen) window.setPdfOpen(false); });
          expC.addEventListener('click', e => e.stopPropagation());
          document.addEventListener('keydown', e => { if (e.key === 'Escape') { overlay.style.display = 'none'; glow.classList.remove('dream-active'); if (window.setPdfOpen) window.setPdfOpen(false); } });
        });
      })();
    }
  </script>
