<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>FunDarkResume</title>

  <!-- Preload critical PDF.js assets -->
  <link rel="preload" href="/pdfjs/build/pdf.min.js" as="script">
  <link rel="preload" href="/pdfjs/build/pdf.worker.min.js" as="script">
  <link rel="preload" href="/pdf/resume.pdf" as="fetch" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { perspective: 1200px; font-family: system-ui, sans-serif; position: fixed; top: 0; left: 0; }

    #bg-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2; display: block; pointer-events: none;
      will-change: transform, opacity; opacity: 0;
      transition: opacity 0.8s;
    }
    #bg-canvas.active { opacity: 0.25; }

    #entrainment-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
      background: white; opacity: 0;
      will-change: opacity; mix-blend-mode: overlay;
      contain: strict;
    }

    #cloud { position: relative; width: 100vw; height: 100vh; overflow: visible; }

    #ring {
      position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      transform-origin: center center; isolation: isolate; will-change: transform;
      animation: none;
    }
    #ring.active { animation: ringRotate 2s linear infinite; }
    body.alignment #ring.active { animation: ringRotate 20s linear infinite; }
    body.action #ring.active { animation: ringRotate 0.5s linear infinite; }

    @keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #ring::after {
      content: '';
      position: fixed; top: 50%; left: 50%;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--burst-bg, #000);
      box-shadow: var(--burst-shadow, 0 0 150px #000, 0 0 300px rgba(0,0,0,0.9));
      opacity: 0; pointer-events: none; z-index: 1;
      transform: translate(-50%, -50%) scale(0.1);
      animation: none;
    }
    #ring.active::after {
      animation: ringBurstEnvelope var(--env-dur, 2s) ease-in-out infinite;
    }

    @keyframes ringBurstEnvelope {
      0%, 75.37% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
      75.37% { opacity: 1; transform: translate(-50%, -50%) scale(150); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(200); }
    }

    .floating-page {
      position: absolute; cursor: pointer; will-change: transform;
      background: transparent; transform-style: preserve-3d;
      backface-visibility: hidden; border-radius: 4px;
      opacity: 0; transition: opacity 0.5s;
    }
    .floating-page.canvas-loaded { opacity: 1; }

    .floating-page canvas {
      display: block; width: 100%; height: 100%; border-radius: 4px;
      background: #000; transform-origin: center center; image-rendering: crisp-edges;
      box-shadow: 0 20px 40px rgba(0,0,0,0.95); will-change: transform, box-shadow;
    }

    body.receptive .floating-page canvas {
      animation: slowSpin 33s linear infinite, squarePulse 0.1667s linear infinite, thumbStrobe 0.1667s step-start infinite;
    }
    body.alignment .floating-page canvas {
      animation: slowSpin 33s linear infinite, squarePulse 0.1667s linear infinite, thumbStrobe 2s step-start infinite;
    }
    body.action .floating-page canvas {
      animation: slowSpin 33s linear infinite, squarePulse 0.0278s linear infinite, thumbStrobe 0.0278s step-start infinite;
    }

    body.receptive .floating-page.spotlight canvas {
      animation: fastSpin 33s linear infinite, whiteFlicker 0.1667s step-start infinite, thumbStrobeTwo 0.1667s step-start infinite !important;
    }
    body.alignment .floating-page.spotlight canvas {
      animation: fastSpin 33s linear infinite, goldFlicker 0.1667s step-start infinite, thumbStrobeTwo 0.1667s step-start infinite !important;
    }
    body.action .floating-page.spotlight canvas {
      animation: fastSpin 33s linear infinite, greenFlicker 0.0278s step-start infinite, thumbStrobeTwo 0.0278s step-start infinite !important;
    }

    body.receptive .floating-page.color-pass canvas {
      animation: slowSpin 33s linear infinite, whitePassGlow 2s ease-in-out infinite, thumbStrobe 0.1667s step-start infinite;
    }
    body.alignment .floating-page.color-pass canvas {
      animation: slowSpin 33s linear infinite, goldPassGlow 2s ease-in-out infinite, thumbStrobe 0.1667s step-start infinite;
    }
    body.action .floating-page.color-pass canvas {
      animation: slowSpin 33s linear infinite, greenPassGlow 0.5s ease-in-out infinite, thumbStrobe 0.0278s step-start infinite;
    }

    .flipper { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s ease-in-out; }
    .flipped .flipper { transform: rotateY(180deg); }

    @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fastSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @keyframes squarePulse {
      0%, 49.9% { box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 80px #fff, 0 0 150px rgba(255,255,255,0.8); }
      50%, 99.9% { box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 80px #000, 0 0 150px rgba(0,0,0,0.95); }
      100% { box-shadow: 0 20px 40px rgba(0,0,0,1), 0 0 80px #fff, 0 0 150px rgba(255,255,255,0.8); }
    }
    @keyframes whiteFlicker { 0%,49.9%{box-shadow:0 20px 40px #000,0 0 120px #FFF,0 0 225px rgba(255,255,255,.95)} 50%,99.9%{box-shadow:0 20px 40px #000,0 0 120px #FEFEFE,0 0 225px rgba(254,254,254,.8)} 100%{box-shadow:0 20px 40px #000,0 0 120px #FFF,0 0 225px rgba(255,255,255,.95)} }
    @keyframes goldFlicker { 0%,49.9%{box-shadow:0 20px 40px #000,0 0 120px #FFD700,0 0 225px rgba(255,215,0,.95)} 50%,99.9%{box-shadow:0 20px 40px #000,0 0 120px #FFC000,0 0 225px rgba(255,192,0,.8)} 100%{box-shadow:0 20px 40px #000,0 0 120px #FFD700,0 0 225px rgba(255,215,0,.95)} }
    @keyframes greenFlicker { 0%,49.9%{box-shadow:0 20px 40px #000,0 0 120px #0F0,0 0 225px rgba(0,255,0,.95)} 50%,99.9%{box-shadow:0 20px 40px #000,0 0 120px #0E0,0 0 225px rgba(0,238,0,.8)} 100%{box-shadow:0 20px 40px #000,0 0 120px #0F0,0 0 225px rgba(0,255,0,.95)} }

    @keyframes thumbStrobe { 0%,49.9%{opacity:1} 50%,99.9%{opacity:.75} 100%{opacity:1} }
    @keyframes thumbStrobeTwo { 0%,49.9%{opacity:.5} 50%,99.9%{opacity:.75} 100%{opacity:.5} }

    @keyframes whitePassGlow { 0%,100%{box-shadow:0 20px 40px #000,0 0 100px rgba(255,255,255,.5),0 0 200px rgba(255,255,255,.4)} 50%{box-shadow:0 20px 40px #000,0 0 150px rgba(255,255,255,.7),0 0 300px rgba(255,255,255,.5)} }
    @keyframes goldPassGlow { 0%,100%{box-shadow:0 20px 40px #000,0 0 100px rgba(255,215,0,.5),0 0 200px rgba(255,215,0,.4)} 50%{box-shadow:0 20px 40px #000,0 0 150px rgba(255,215,0,.7),0 0 300px rgba(255,215,0,.5)} }
    @keyframes greenPassGlow { 0%,100%{box-shadow:0 20px 40px #000,0 0 100px rgba(0,255,0,.5),0 0 200px rgba(0,255,0,.4)} 50%{box-shadow:0 20px 40px #000,0 0 150px rgba(0,255,0,.7),0 0 300px rgba(0,255,0,.5)} }

    #overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
      z-index:1000; display:none; justify-content:center; align-items:center;
      cursor:zoom-out; overflow:visible; pointer-events:auto;
    }

    #glow-wrapper { position:relative; display:inline-block; max-width:95vw; max-height:95vh; }

    #glow-wrapper::after {
      content:''; position:absolute; top:50%; left:50%; width:100%; height:100%;
      background:transparent; pointer-events:none; z-index:-2; transform:translate(-50%,-50%);
      will-change:box-shadow,opacity; opacity:0; transition:opacity .2s;
    }
    #glow-wrapper.dream-active::after {
      opacity:var(--sparkle-opacity,0);
      box-shadow:0 0 4000px rgba(255,255,255,.95),0 0 2400px #fff,0 0 6000px rgba(255,255,255,.8);
    }

    #glow-wrapper::before {
      content:''; position:absolute; top:50%; left:50%; width:100%; height:100%;
      background: var(--burst-bg, transparent);
      box-shadow: var(--burst-shadow, none);
      pointer-events:none; z-index:-1; transform:translate(-50%,-50%);
      will-change:box-shadow,background,opacity; opacity:0; transition:opacity .2s;
    }
    #glow-wrapper.dream-active::before {
      opacity:1;
      animation:glowBurstEnvelope var(--env-dur,2s) ease-in-out infinite;
    }

    @keyframes glowBurstEnvelope { 0%,75.37%{opacity:0} 75.37%{opacity:1} 100%{opacity:0} }

    #overlay canvas {
      max-width:95vw; max-height:95vh; border-radius:6px;
      cursor:default; background:#000; box-shadow:none;
      position:relative; z-index:2;
    }

    /* ── Fullscreen Invitation ── */
    #fullscreen-invite {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 20%, #1a0d16, #000000);
      z-index: 5000; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      cursor: default; text-align: center;
      user-select: none;
    }
    #atomic-canvas {
      position: absolute;
      width: min(80vw, 80vh);
      height: min(80vw, 80vh);
      pointer-events: none;
      z-index: 1;
      background: transparent;
    }
    .haiku-center {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 2.2rem; letter-spacing: 1px;
      background: transparent; padding: 1.5rem 2rem; border-radius: 20px;
    }
    .invite-line {
      opacity: 0; transition: opacity 1.2s ease; margin: 8px 0;
    }
    .line1 { color: #FFFFFF; --glow-color: rgba(255,255,255,0.9); animation: breatheGlow 3s ease-in-out infinite; }
    .line2 { color: #FFD700; --glow-color: rgba(255,215,0,0.9); animation: breatheGlow 3s ease-in-out infinite 0.5s; }
    .line3 { color: #00FF00; --glow-color: rgba(0,255,0,0.9); animation: breatheGlow 3s ease-in-out infinite 1s; }

    @keyframes breatheGlow {
      0%, 100% { text-shadow: 0 0 8px var(--glow-color), 0 0 16px var(--glow-color), 0 0 32px var(--glow-color); }
      50% { text-shadow: 0 0 16px var(--glow-color), 0 0 32px var(--glow-color), 0 0 64px var(--glow-color); }
    }

    /* Cool consent button */
    #consent-btn {
      position: relative; z-index: 3; margin-top: 28px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #790B3E 0%, #A62C60 100%);
      color: #fff; border: none; border-radius: 8px;
      font-size: 1.1rem; font-weight: 600; letter-spacing: 1px;
      cursor: pointer; display: none;
      text-transform: uppercase;
      box-shadow: 0 0 15px #790B3E, 0 0 30px rgba(255,215,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: pulseConsent 2s ease-in-out infinite;
    }
    #consent-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #FFD700, 0 0 40px #790B3E;
    }
    @keyframes pulseConsent {
      0%, 100% { box-shadow: 0 0 15px #790B3E, 0 0 30px rgba(255,215,0,0.4); }
      50% { box-shadow: 0 0 25px #FFD700, 0 0 45px #790B3E; }
    }

    /* ── Eye Symbol ── */
    #eye-symbol {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      width: 160px; height: 160px; z-index:0;
      cursor:pointer; opacity: 0; pointer-events: none;
      filter: drop-shadow(0 0 25px currentColor);
      transition: filter 0.3s;
    }
    #eye-symbol.active { opacity: 1; pointer-events: auto; }
    #eye-symbol svg { display: block; width: 100%; height: 100%; }

    .glow-ring {
      transform-origin: center;
      animation: spinGlow 10s linear infinite;
    }
    @keyframes spinGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>

  <script>
    // ── Atomic Whirl Canvas ──
    (function() {
      const canvas = document.getElementById('atomic-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = 600; canvas.width = size; canvas.height = size;
      const center = { x: size/2, y: size/2 };
      const rings = [
        { a:140, b:92, tilt:0.2, phaseOffset:0.0, lineColor:'rgba(121,11,62,0.7)', textColor:'#D86196', words:6 },
        { a:180, b:125, tilt:0.85, phaseOffset:0.4, lineColor:'rgba(146,30,80,0.65)', textColor:'#E272A4', words:7 },
        { a:220, b:160, tilt:1.45, phaseOffset:0.8, lineColor:'rgba(106,8,52,0.7)', textColor:'#F097B8', words:8 },
        { a:265, b:195, tilt:2.2, phaseOffset:1.2, lineColor:'rgba(160,35,90,0.6)', textColor:'#FFB3D0', words:9 }
      ];
      const DELTA_MS = 2000;

      function ellipsePt(cx,cy,a,b,tilt,ang){
        const xe=a*Math.cos(ang), ye=b*Math.sin(ang), ct=Math.cos(tilt), st=Math.sin(tilt);
        return {x:cx+xe*ct-ye*st, y:cy+xe*st+ye*ct};
      }
      function drawNucleus(){
        const g=ctx.createRadialGradient(center.x,center.y,5,center.x,center.y,32);
        g.addColorStop(0,'#790B3E'); g.addColorStop(0.7,'#A62C60'); g.addColorStop(1,'#F27BAE');
        ctx.beginPath(); ctx.arc(center.x,center.y,18,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      }
      function drawOrbitPath(r){
        ctx.save(); ctx.beginPath();
        ctx.ellipse(center.x,center.y,r.a,r.b,r.tilt,0,Math.PI*2);
        ctx.strokeStyle=r.lineColor; ctx.lineWidth=1.8; ctx.setLineDash([8,12]); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
      }
      function drawRingText(r,now){
        const total=2*Math.PI, count=r.words, angPer=total/count;
        const base=((now%DELTA_MS)/DELTA_MS)*total+r.phaseOffset;
        ctx.save(); ctx.font='13px "Segoe UI",sans-serif'; ctx.fillStyle=r.textColor;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        for(let i=0;i<count;i++){
          const a=base+i*angPer, p=ellipsePt(center.x,center.y,r.a,r.b,r.tilt,a);
          const p2=ellipsePt(center.x,center.y,r.a,r.b,r.tilt,a+0.01);
          const ta=Math.atan2(p2.y-p.y,p2.x-p.x);
          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ta); ctx.fillText('enter',0,0); ctx.restore();
          ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fillStyle=r.textColor; ctx.fill();
        }
        ctx.restore();
      }

      let lt=0;
      function anim(now){ requestAnimationFrame(anim);
        if(!lt){lt=now; return;}
        let dt=Math.min(0.033,(now-lt)/1000); if(dt<=0) dt=0.016; lt=now;
        ctx.clearRect(0,0,size,size);
        for(let r of rings) drawOrbitPath(r);
        for(let r of rings) drawRingText(r,now);
        drawNucleus();
      }
      requestAnimationFrame(anim);
    })();
  </script>

  <script>
    let ritualStarted = false;
    window.eyeState = { velocityMag:0, saccading:false };
    let audioCtx=null, leftOsc=null, rightOsc=null, leftGain=null, rightGain=null;

    function initAudio(){
      try{
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        leftOsc=audioCtx.createOscillator(); rightOsc=audioCtx.createOscillator();
        leftOsc.type='sine'; rightOsc.type='sine';
        leftGain=audioCtx.createGain(); rightGain=audioCtx.createGain();
        leftGain.gain.value=0.08; rightGain.gain.value=0.08;
        const lp=audioCtx.createStereoPanner(); lp.pan.value=-1;
        const rp=audioCtx.createStereoPanner(); rp.pan.value=1;
        leftOsc.connect(leftGain).connect(lp).connect(audioCtx.destination);
        rightOsc.connect(rightGain).connect(rp).connect(audioCtx.destination);
        leftOsc.start(); rightOsc.start();
      }catch(e){ console.warn('Audio unavailable'); audioCtx=null; }
    }

    function updateAudioFreq(freq){
      if(!audioCtx) return;
      const b=200, t=audioCtx.currentTime+0.05;
      leftOsc.frequency.setTargetAtTime(b+freq/2,t,0.02);
      rightOsc.frequency.setTargetAtTime(b-freq/2,t,0.02);
    }

    function startRitual(){
      if(ritualStarted) return;
      ritualStarted=true;
      const redMot=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const useBlur=!redMot && navigator.hardwareConcurrency>=4;
      if(!useBlur){
        const ov=document.getElementById('overlay');
        ov.style.backdropFilter='none'; ov.style.background='rgba(0,0,0,0.92)';
      }
      document.getElementById('ring').classList.add('active');
      document.getElementById('bg-canvas').classList.add('active');
      document.getElementById('eye-symbol').classList.add('active');
      initAudio();
      startEntrainmentEngine();
      startStaticCanvas();
      startPDFRitual();
    }

    const prefRedMot=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let reducedMotion=prefRedMot;
    window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change',e=>reducedMotion=e.matches);
    document.addEventListener('contextmenu',e=>e.preventDefault());
    window.addEventListener('beforeunload',()=>{ document.body.style.background='#000'; });

    // ── Eye tracking ──
    (function(){
      const svgRoot=document.querySelector('#eye-symbol svg');
      const eyeballGroup=document.getElementById('eyeballGroup');
      const clipPathShape=document.getElementById('clipPathShape');
      const upperLid=document.getElementById('upperLidGroup');
      const lowerLid=document.getElementById('lowerLidGroup');
      if(!eyeballGroup||!svgRoot) return;

      const MAX_TX=95, MAX_UP=55, MAX_DN=85;
      let cx=0,cy=0, vx=0,vy=0, tx=0,ty=0, ltx=0,lty=0;
      const GAIN=6.5, DAMP=0.96, MAXV=45.0;
      let saccActive=false, ssX=0,ssY=0, seX=0,seY=0, sprog=0;
      const SACC_DUR=28, SACC_THR=12.0;
      const UP_LID_UP=-18, LOW_LID_DN=28, SQUINT=6;

      function updEyelids(px,py){
        let ny=py/(py>=0?MAX_DN:MAX_UP); ny=Math.min(1,Math.max(-1,ny));
        let nx=px/MAX_TX;
        let uy=0;
        if(ny<0) uy=UP_LID_UP*(-ny); else if(ny>0) uy=SQUINT*ny;
        let hs=px*0.04; upperLid.setAttribute('transform',`translate(${hs},${uy})`);
        let ly=0; if(ny>0) ly=LOW_LID_DN*ny;
        lowerLid.setAttribute('transform',`translate(${hs},${ly})`);
        let uY=35, lY=367;
        if(ny<0){ let f=-ny; uY=35-f*15; lY=367-f*8; }
        else if(ny>0){ let f=ny; uY=35+f*4; lY=367+f*25; }
        uY=Math.min(50,Math.max(20,uY)); lY=Math.min(400,Math.max(340,lY));
        let sx=px*0.06; let lx=85+sx, rx=315+sx;
        let umx=195+sx*0.5, lmx=205+sx*0.5;
        let d=`M ${lx},200 Q ${umx},${uY} ${rx},200 Q ${lmx},${lY} ${lx},200 Z`;
        clipPathShape.setAttribute('d',d);
      }

      function constrainTarget(x,y){
        let cx=Math.min(MAX_TX,Math.max(-MAX_TX,x));
        let maxY=y>=0?MAX_DN:MAX_UP, cy=Math.min(maxY,Math.max(-maxY,y));
        let nx=cx/MAX_TX, ny=cy/(cy>=0?MAX_DN:MAX_UP);
        let dist=Math.sqrt(nx*nx+ny*ny);
        if(dist>1){ let sc=1/dist; cx=(nx*sc)*MAX_TX; cy=(ny*sc)*(cy>=0?MAX_DN:MAX_UP); }
        return {x:cx,y:cy};
      }

      function getTarget(cx,cy){
        let pt=new DOMPoint(cx,cy); let ctm=svgRoot.getScreenCTM();
        if(!ctm) return {x:0,y:0};
        let cur=pt.matrixTransform(ctm.inverse());
        return constrainTarget(cur.x-200,cur.y-200);
      }

      function startSacc(toX,toY){ saccActive=true; ssX=cx; ssY=cy; seX=toX; seY=toY; sprog=0; vx=vy=0; }

      function updEye(ms){
        let ds=Math.min(0.033,ms/1000);
        if(saccActive){
          sprog+=ms/SACC_DUR; if(sprog>=1){ cx=seX; cy=seY; saccActive=false; }
          else{ let t=sprog, e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; cx=ssX+(seX-ssX)*e; cy=ssY+(seY-ssY)*e; }
          eyeballGroup.setAttribute('transform',`translate(${cx},${cy})`);
          updEyelids(cx,cy);
          window.eyeState.velocityMag=Math.hypot(seX-ssX,seY-ssY)/SACC_DUR*20; window.eyeState.saccading=true;
          return;
        }
        let dtPred=Math.min(0.1,ds);
        let tvx=(tx-ltx)/dtPred, tvy=(ty-lty)/dtPred;
        tvx=Math.min(80,Math.max(-80,tvx)); tvy=Math.min(80,Math.max(-80,tvy));
        let ptx=tx+tvx*0.033, pty=ty+tvy*0.033;
        let pc=constrainTarget(ptx,pty); ptx=pc.x; pty=pc.y;
        let ex=ptx-cx, ey=pty-cy;
        if(Math.hypot(ex,ey)>SACC_THR&&ms>10){ startSacc(ptx,pty); return; }
        let fx=ex*GAIN*ds, fy=ey*GAIN*ds;
        vx+=fx; vy+=fy; vx*=DAMP; vy*=DAMP;
        let sp=Math.hypot(vx,vy); if(sp>MAXV){ vx=vx/sp*MAXV; vy=vy/sp*MAXV; }
        let nx=cx+vx*ds, ny=cy+vy*ds;
        let fpos=constrainTarget(nx,ny); cx=fpos.x; cy=fpos.y;
        eyeballGroup.setAttribute('transform',`translate(${cx},${cy})`);
        ltx=tx; lty=ty; window.eyeState.velocityMag=sp; window.eyeState.saccading=false;
        updEyelids(cx,cy);
      }

      function onMove(cx,cy){ let t=getTarget(cx,cy); tx=t.x; ty=t.y; }
      function reset(){
        cx=cy=vx=vy=tx=ty=ltx=lty=0; saccActive=false;
        eyeballGroup.setAttribute('transform','translate(0,0)');
        updEyelids(0,0); upperLid.setAttribute('transform','translate(0,0)'); lowerLid.setAttribute('transform','translate(0,0)');
        window.eyeState.velocityMag=0; window.eyeState.saccading=false;
      }

      let lft=0;
      function anim(now){ requestAnimationFrame(anim); let dt=Math.min(50,now-lft); if(dt>2) updEye(dt); lft=now; }

      window.addEventListener('mousemove',e=>{ if(ritualStarted) onMove(e.clientX,e.clientY); });
      window.addEventListener('mouseleave',reset);
      window.addEventListener('touchmove',e=>{ if(ritualStarted&&e.touches.length){ onMove(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); } },{passive:false});
      window.addEventListener('touchend',reset);
      window.addEventListener('touchstart',e=>{ if(ritualStarted&&e.touches.length) onMove(e.touches[0].clientX,e.touches[0].clientY); });

      document.getElementById('eye-symbol').addEventListener('click', () => {
        if (!ritualStarted || !window.setPdfOpen) return;
        document.getElementById('overlay').style.display='flex';
        document.getElementById('glow-wrapper').classList.add('dream-active');
        window.setPdfOpen(true);
      });

      reset(); lft=performance.now(); anim(lft);
    })();

    // ═══════════ Phase Scheduler (37 s master timer) ═══════════
    class PhaseScheduler {
      constructor() {
        this.startTime = performance.now();
        this.REC = 15000; this.ALIGN = 10000; this.ACT = 12000;
        this.TOTAL = this.REC + this.ALIGN + this.ACT;
        this.state = { phase:'receptive', sub:'alpha', freq:10 };
        this._lastGlobal = 'receptive';
        this.phaseTransitionTime = 0;
      }

      _elapsed(t) {
        let e = (t - this.startTime) % this.TOTAL;
        if (e < 0) e += this.TOTAL;
        return e;
      }

      update(now) {
        const elapsed = this._elapsed(now);
        let phase, sub, freq, beta, gamma;
        if (elapsed < this.REC) {
          phase = 'receptive';
          if      (elapsed < 5000)  { sub = 'alpha'; freq = 10; }
          else if (elapsed < 10000) { sub = 'theta'; freq = 6; }
          else                      { sub = 'delta'; freq = 2; }
        } else if (elapsed < this.REC + this.ALIGN) {
          phase = 'alignment'; sub = null; freq = 0.05;
        } else {
          phase = 'action'; sub = null;
          const ae = elapsed - this.REC - this.ALIGN;
          beta = 18; gamma = 36;
          if (ae < 2000) {
            const t = ae / 2000;
            const ef = t <= 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
            beta  = 18 * ef;
            gamma = 36 * ef;
          }
          freq = gamma;
        }
        if (phase !== this.state.phase) {
          this.phaseTransitionTime = now;
          this._lastGlobal = phase;
        }
        this.state = { phase, sub, freq, beta, gamma };
      }

      forceAction() {
        this.state = { phase:'action', sub:null, freq:36, beta:18, gamma:36 };
      }

      integratePhase(prevTime, now) {
        let cur = prevTime;
        let dp = 0;
        while (cur < now) {
          const segEnd = Math.min(now, cur + 100);
          const e = this._elapsed(cur);
          let freq;
          if (e < this.REC) {
            if      (e < 5000)  freq = 10;
            else if (e < 10000) freq = 6;
            else                freq = 2;
          } else if (e < this.REC + this.ALIGN) {
            freq = 0.05;
          } else {
            const ae = e - this.REC - this.ALIGN;
            freq = ae < 2000 ? (3 + (36-3)*((ae/2000)<=0.5?2*(ae/2000)*(ae/2000):1-Math.pow(-2*(ae/2000)+2,2)/2)) : 36;
          }
          dp += 2 * Math.PI * freq * (segEnd - cur) / 1000;
          cur = segEnd;
        }
        return dp;
      }
    }

    // ── Entrainment engine ──
    function startEntrainmentEngine(){
      const overlay = document.getElementById('entrainment-overlay');
      const ring = document.getElementById('ring');
      const glow = document.getElementById('glow-wrapper');
      const eyeSym = document.getElementById('eye-symbol');

      const scheduler = new PhaseScheduler();
      let pdfOpen = false;
      let carrierPhase = 0;
      let betaPhase = 0;
      let strobePhase = 0;
      let infraPhase = 0, hrvOff = 0;
      let ptt = 0;
      let smoothVel = 0;
      let prevTime;

      const phaseColors = { receptive:'#FFFFFF', alignment:'#FFD700', action:'#790B3E' };
      function updEyeColors(ph){
        const c = phaseColors[ph] || '#FFFFFF';
        document.querySelectorAll('.glow-ring').forEach(e=>e.setAttribute('stroke',c));
        document.querySelectorAll('.sparkle').forEach(e=>e.setAttribute('fill',c));
        eyeSym.style.color = c;
      }

      const colorSteps = {
        receptive: [
          { u:0.7537,  bg:'#000',     s:'0 0 150px #000,0 0 300px rgba(0,0,0,.9)' },
          { u:0.79475, bg:'#FFFFFF',  s:'0 0 150px #FFF,0 0 300px rgba(255,255,255,.9)' },
          { u:0.8358,  bg:'#FEFEFE',  s:'0 0 150px #FEFEFE,0 0 300px rgba(254,254,254,.9)' },
          { u:0.87685, bg:'#FAFAFA',  s:'0 0 150px #FAFAFA,0 0 300px rgba(250,250,250,.9)' },
          { u:0.9179,  bg:'#FFFFFF',  s:'0 0 150px #FFF,0 0 300px rgba(255,255,255,.95)' },
          { u:0.95895, bg:'#FFFFFF',  s:'0 0 150px #FFF,0 0 300px rgba(255,255,255,.9)' },
          { u:1.0,     bg:'#000',     s:'0 0 150px #000,0 0 300px rgba(0,0,0,.9)' }
        ],
        alignment: [
          { u:0.7537,  bg:'#000',     s:'0 0 150px #000,0 0 300px rgba(0,0,0,.9)' },
          { u:0.79475, bg:'#FFEA00',  s:'0 0 150px #FFEA00,0 0 300px rgba(255,234,0,.9)' },
          { u:0.8358,  bg:'#FFD700',  s:'0 0 150px #FFD700,0 0 300px rgba(255,215,0,.9)' },
          { u:0.87685, bg:'#FFC000',  s:'0 0 150px #FFC000,0 0 300px rgba(255,192,0,.9)' },
          { u:0.9179,  bg:'#FFF200',  s:'0 0 150px #FFF200,0 0 300px rgba(255,242,0,.95)' },
          { u:0.95895, bg:'#FFD700',  s:'0 0 150px #FFD700,0 0 300px rgba(255,215,0,.9)' },
          { u:1.0,     bg:'#FFFFFF',  s:'0 0 150px #FFF,0 0 300px rgba(255,255,255,.9)' }
        ],
        action: [
          { u:0.7537,  bg:'#000',     s:'0 0 150px #000,0 0 300px rgba(0,0,0,.9)' },
          { u:0.79475, bg:'#00FF00',  s:'0 0 150px #0F0,0 0 300px rgba(0,255,0,.9)' },
          { u:0.8358,  bg:'#33FF33',  s:'0 0 150px #33FF33,0 0 300px rgba(51,255,51,.9)' },
          { u:0.87685, bg:'#00EE00',  s:'0 0 150px #0E0,0 0 300px rgba(0,238,0,.9)' },
          { u:0.9179,  bg:'#66FF66',  s:'0 0 150px #66FF66,0 0 300px rgba(102,255,102,.95)' },
          { u:0.95895, bg:'#00FF00',  s:'0 0 150px #0F0,0 0 300px rgba(0,255,0,.9)' },
          { u:1.0,     bg:'#000',     s:'0 0 150px #000,0 0 300px rgba(0,0,0,.9)' }
        ]
      };

      function getBurst(ph,prog){
        const st = colorSteps[ph] || colorSteps.receptive;
        for (let i=0;i<st.length;i++) if (prog<=st[i].u) return {bg:st[i].bg, s:st[i].s};
        return st[st.length-1];
      }

      function applyRing(phaseName){
        document.body.className = phaseName;
        if (phaseName==='receptive') { ring.style.setProperty('--env-dur','2s'); glow.style.setProperty('--env-dur','2s'); }
        else if (phaseName==='alignment') { ring.style.setProperty('--env-dur','5s'); glow.style.setProperty('--env-dur','5s'); }
        else { ring.style.setProperty('--env-dur','0.5s'); glow.style.setProperty('--env-dur','0.5s'); }
      }

      function loop(now){
        requestAnimationFrame(loop);
        let dt = prevTime ? (now - prevTime) / 1000 : 0;
        dt = Math.max(0, dt);
        prevTime = now;

        if (!pdfOpen) {
          if (dt > 1) {
            const dp = scheduler.integratePhase(prevTime - dt*1000, now);
            carrierPhase = (carrierPhase + dp) % (2*Math.PI);
            betaPhase = (betaPhase + 2*Math.PI * 18 * dt) % (2*Math.PI);
          } else {
            const step = 0.001;
            let rem = dt;
            while (rem > 0) {
              const d = Math.min(step, rem);
              scheduler.update(now);
              if (scheduler.state.phase === 'action') {
                const { beta, gamma } = scheduler.state;
                carrierPhase = (carrierPhase + 2*Math.PI * gamma * d) % (2*Math.PI);
                betaPhase    = (betaPhase    + 2*Math.PI * beta  * d) % (2*Math.PI);
              } else {
                carrierPhase = (carrierPhase + 2*Math.PI * scheduler.state.freq * d) % (2*Math.PI);
              }
              rem -= d;
            }
          }
        } else {
          scheduler.forceAction();
          if (dt > 0) {
            carrierPhase = (carrierPhase + 2*Math.PI * 36 * dt) % (2*Math.PI);
            betaPhase    = (betaPhase    + 2*Math.PI * 18 * dt) % (2*Math.PI);
          }
        }

        const { phase, sub, freq, beta, gamma } = scheduler.state;
        if (scheduler.phaseTransitionTime) {
          ptt = scheduler.phaseTransitionTime;
          scheduler.phaseTransitionTime = 0;
        }

        applyRing(phase);
        updEyeColors(phase);

        if (reducedMotion) {
          overlay.style.opacity = 0; eyeSym.style.opacity = 0;
          const bd = phase==='receptive'?2:(phase==='alignment'?5:0.5);
          const bp = ((now - scheduler.startTime) % (bd*1000)) / (bd*1000);
          const b = getBurst(phase,bp);
          ring.style.setProperty('--burst-bg',b.bg); ring.style.setProperty('--burst-shadow',b.s);
          if (glow) { glow.style.setProperty('--burst-bg',b.bg); glow.style.setProperty('--burst-shadow','0 0 4000px '+b.bg+',0 0 6000px '+b.bg); }
          return;
        }

        eyeSym.style.opacity = 1;
        updateAudioFreq(freq);

        if (dt > 0) {
          hrvOff += (Math.random()-0.5)*0.0002*dt;
          hrvOff = Math.max(-0.015,Math.min(0.015,hrvOff));
          const infraF = 0.05 + hrvOff;
          infraPhase += 2*Math.PI*infraF*dt;
          if (infraPhase > 2*Math.PI) infraPhase -= 2*Math.PI;
        }
        const infra = 0.5 + 0.5*Math.sin(infraPhase);

        const bd = phase==='receptive'?2:(phase==='alignment'?5:0.5);
        const bp = ((now - scheduler.startTime) % (bd*1000)) / (bd*1000);
        const b = getBurst(phase,bp);
        ring.style.setProperty('--burst-bg',b.bg); ring.style.setProperty('--burst-shadow',b.s);
        if (glow) { glow.style.setProperty('--burst-bg',b.bg); glow.style.setProperty('--burst-shadow','0 0 4000px '+b.bg+',0 0 6000px '+b.bg); }
        glow.style.setProperty('--sparkle-opacity',infra);

        // Ring strobe
        const strobeFreq = (phase==='action')?36:(phase==='alignment'?0.5:2);
        if (dt > 0) strobePhase = (strobePhase + 2*Math.PI*strobeFreq*dt) % (2*Math.PI);
        ring.style.visibility = Math.sin(strobePhase)>=0 ? 'visible':'hidden';
        if (glow) glow.style.visibility = ring.style.visibility;

        // luminance overlay with PAC for action
        let flick = 1;
        if (phase === 'receptive') {
          if (sub === 'delta') flick = 0.5 + 0.5*Math.sin(carrierPhase);
          else flick = Math.sin(carrierPhase) >= 0 ? 1 : 0;
        } else if (phase === 'alignment') {
          flick = 1;
        } else {
          const gammaFlicker = Math.sin(carrierPhase) >= 0 ? 1 : 0;
          const betaMod = 0.5 + 0.5 * Math.sin(betaPhase);
          flick = gammaFlicker * betaMod;
        }

        let op = 0;
        if (phase === 'receptive') op = flick * infra * 0.35;
        else if (phase === 'alignment') op = infra * 0.25;
        else op = flick * infra * 0.35;

        if (window.eyeState) {
          smoothVel = smoothVel*0.9 + window.eyeState.velocityMag*0.1;
          const ag = 1 + Math.min(0.5, smoothVel*0.02);
          op = Math.min(1, op*ag);
        }

        if (ptt) {
          const ts = (now - ptt) / 1000;
          if (ts < 0.15) op *= Math.sin((ts/0.15)*Math.PI);
          else if (ts < 0.25) {}
          else ptt = 0;
        }

        overlay.style.opacity = op;
      }

      requestAnimationFrame(loop);
      window.setPdfOpen = v => pdfOpen = v;
      window.getCurrentPhase = () => scheduler.state.phase;
    }

    // ── Static canvas ──
    function startStaticCanvas(){
      const c=document.getElementById('bg-canvas'), ctx=c.getContext('2d');
      const aP=['#4a3500','#6b4e00','#8b6500','#b8860b','#daa520','#ffd700','#ffea00','#fff200','#ffc000','#ffd700','#b8860b','#8b6500','#4a3500','#6b4e00','#8b6500','#daa520','#ffd700','#ffea00'];
      const gP=['#00FF00','#33FF33','#00EE00','#66FF66','#00FF00','#33FF33','#00CC00','#009900','#006600','#00AA00','#00FF00','#33FF33','#00EE00','#66FF66','#00FF00','#33FF33','#00CC00','#009900'];
      const sf=navigator.hardwareConcurrency<4?0.5:1;
      let pal=null, lastP='receptive', lt=0, fps=10;
      function resize(){ c.width=Math.floor(innerWidth*sf); c.height=Math.floor(innerHeight*sf); if(sf<1) c.style.imageRendering='pixelated'; }
      function drawR(){ const w=c.width,h=c.height, img=ctx.createImageData(w,h), d=img.data; for(let i=0;i<d.length;i+=4){ d[i]=Math.random()*256; d[i+1]=Math.random()*256; d[i+2]=Math.random()*256; d[i+3]=255; } ctx.putImageData(img,0,0); }
      function drawP(pl){ const w=c.width,h=c.height, img=ctx.createImageData(w,h), d=img.data; const len=pl.length; for(let i=0;i<d.length;i+=4){ const c=pl[Math.floor(Math.random()*len)]; d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b; d[i+3]=255; } ctx.putImageData(img,0,0); }
      function tick(now){ requestAnimationFrame(tick); if(document.hidden) return; const cp=window.getCurrentPhase?window.getCurrentPhase():'receptive';
        if(document.body.classList.contains('action')) fps=36; else if(document.body.classList.contains('alignment')) fps=10; else fps=10;
        const iv=1000/fps; if(cp!==lastP){ lastP=cp; if(cp==='alignment') pal=aP.map(h=>({r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}));
          else if(cp==='action') pal=gP.map(h=>({r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)})); else pal=null; }
        if(now-lt>=iv){ lt=now; if(cp==='receptive') drawR(); else drawP(pal); } }
      let rt; addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(resize,16); }); resize(); requestAnimationFrame(tick);
    }

    // ── PDF ritual ──
    function startPDFRitual(){
      (async function(){
        const MW=10000, sw=performance.now();
        function waitForLib(resolve){
          if(typeof pdfjsLib!=='undefined') return resolve();
          if(performance.now()-sw>MW){ showPdfError('PDF library could not be loaded.'); return; }
          setTimeout(()=>waitForLib(resolve),50);
        }
        await new Promise(waitForLib);
        if(typeof pdfjsLib==='undefined') return;

        pdfjsLib.GlobalWorkerOptions.workerSrc=window.PDFJS_LOCAL?'/pdfjs/build/pdf.worker.min.js':'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdf;
        try{ pdf=await pdfjsLib.getDocument('/pdf/resume.pdf').promise; }
        catch(e){ showPdfError('Resume file not found.'); return; }

        const pages=pdf.numPages;
        const ringEl=document.getElementById('ring');
        const overlay=document.getElementById('overlay');
        const glow=document.getElementById('glow-wrapper');
        const expC=document.getElementById('expanded-canvas');
        const COPIES=33, SCALE=0.35, STAGGER=167;
        const pageData=[], all=[];
        function posOnCircle(el,idx,tot,w,h){
          const a=idx/tot*2*Math.PI-Math.PI/2-(tot-1)/tot*2*Math.PI;
          const r=Math.min(innerWidth,innerHeight)*0.4;
          el.style.left=(Math.cos(a)*r-w/2)+'px'; el.style.top=(Math.sin(a)*r-h/2)+'px';
        }

        for(let p=1;p<=pages;p++){
          const page=await pdf.getPage(p); const vp=page.getViewport({scale:SCALE}), orig=page.getViewport({scale:2.0});
          const tc=document.createElement('canvas'); tc.width=vp.width; tc.height=vp.height;
          await page.render({canvasContext:tc.getContext('2d'), viewport:vp}).promise;
          pageData[p]={page, viewport:orig, thumbCanvas:tc, thumbWidth:vp.width, thumbHeight:vp.height};
        }

        const totalCopies=pages*COPIES;
        const spotlightIndices = [10, 21, 32];
        const skipSet = new Set(spotlightIndices);
        let idx=0;
        for(let p=1;p<=pages;p++){
          const {thumbCanvas,thumbWidth,thumbHeight}=pageData[p];
          for(let c=0;c<COPIES;c++){
            const floater=document.createElement('div'); floater.className='floating-page';
            const cc=document.createElement('canvas'); cc.width=thumbWidth; cc.height=thumbHeight;
            cc.getContext('2d').drawImage(thumbCanvas,0,0);
            const flipper=document.createElement('div'); flipper.className='flipper';
            flipper.appendChild(cc); floater.appendChild(flipper);
            floater.style.width=thumbWidth+'px'; floater.style.height=thumbHeight+'px';
            floater.style.left='-9999px'; floater.style.top='-9999px';
            const rx=(Math.random()-0.5)*8, ry=(Math.random()-0.5)*8, rz=(Math.random()-0.5)*6;
            floater.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg) translateZ(${Math.random()*30}px)`;
            floater.dataset.page=p; floater.dataset.index=idx;

            let z=10;
            if(idx<11) z=20+idx; else if(idx<22) z=30+(idx-11); else z=40+(idx-22);
            floater.style.zIndex=z;
            if(spotlightIndices.includes(idx)){ floater.classList.add('spotlight'); floater.style.zIndex=200; }

            floater.addEventListener('click',async(e)=>{ e.stopPropagation(); openPage(parseInt(floater.dataset.page)); });

            ringEl.appendChild(floater);
            all.push({element:floater, flipper, index:idx, width:thumbWidth, height:thumbHeight});
            setTimeout((el,i,w,h)=>posOnCircle(el,i,totalCopies,w,h), idx*STAGGER, floater, idx, thumbWidth, thumbHeight);
            setTimeout(()=>floater.classList.add('canvas-loaded'), idx*STAGGER+200);
            idx++;
          }
          pageData[p].thumbCanvas=null;
        }

        async function openPage(pageNum){
          const {page, viewport}=pageData[pageNum];
          expC.width=viewport.width; expC.height=viewport.height;
          const ctx=expC.getContext('2d');
          await page.render({canvasContext:ctx, viewport}).promise;
          overlay.style.display='flex'; glow.classList.add('dream-active');
          if(window.setPdfOpen) window.setPdfOpen(true);
        }

        const eligible=all.map((_,i)=>i).filter(i=>!skipSet.has(i));
        const sizes=[2,4,5]; let gi=0, pos=0;
        function applyColorPass(){
          eligible.forEach(i=>all[i].element.classList.remove('color-pass'));
          const sz=sizes[gi], grp=[]; for(let i=0;i<sz;i++) grp.push(eligible[(pos+i)%eligible.length]);
          grp.forEach(i=>all[i].element.classList.add('color-pass'));
          pos=(pos+sz)%eligible.length; gi=(gi+1)%sizes.length;
        }
        setTimeout(()=>{ applyColorPass(); setInterval(applyColorPass,8000); }, totalCopies*STAGGER+2000);
        function flip(){ all.forEach(item=>item.element.classList.toggle('flipped')); }
        setTimeout(()=>{ flip(); setInterval(flip,2000); }, totalCopies*STAGGER+3000);

        addEventListener('resize',()=>all.forEach(({element, index, width, height})=>posOnCircle(element, index, totalCopies, width, height)));

        overlay.addEventListener('click',()=>{ overlay.style.display='none'; glow.classList.remove('dream-active'); if(window.setPdfOpen) window.setPdfOpen(false); });
        expC.addEventListener('click', e => e.stopPropagation());
        document.addEventListener('keydown',e=>{ if(e.key==='Escape') { overlay.style.display='none'; glow.classList.remove('dream-active'); if(window.setPdfOpen) window.setPdfOpen(false); } });
      })();
    }

    function showPdfError(msg){
      const old = document.querySelector('.pdf-error');
      if(old) old.remove();
      const err=document.createElement('div');
      err.className='pdf-error';
      err.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;color:#ff5555;padding:10px 20px;border:1px solid #ff5555;z-index:9999;border-radius:4px;font-weight:bold;';
      err.textContent=msg;
      document.body.appendChild(err);
      err.addEventListener('click',()=>err.remove());
    }
  </script>
