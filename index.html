<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    iframe{width:100%;height:100%;border:none;display:block}
    .dl{
      position:fixed;bottom:16px;right:20px;z-index:9999;background:#0d1117;
      padding:8px 16px;border-radius:6px;opacity:.5;border:1px solid #30363d;
      backdrop-filter:blur(4px);transition:opacity .2s
    }
    .dl:hover{opacity:1}
    .dl a{color:#c9d1d9;text-decoration:none;font-family:sans-serif;font-size:13px}
  </style>
</head>
<body>
  <iframe src="/pdfjs/web/viewer.html"></iframe>
  <div class="dl"><a href="/pdf/resume.pdf" download>⬇ Download PDF</a></div>
</body>
</html>
