<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>FunDarkResume</title>

  <link rel="preload" href="/pdfjs/build/pdf.min.js" as="script">
  <link rel="preload" href="/pdfjs/build/pdf.worker.min.js" as="script">
  <link rel="preload" href="/pdf/resume.pdf" as="fetch" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { perspective: 1200px; font-family: system-ui, sans-serif; position: fixed; top: 0; left: 0; }

    #bg-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2; display: block; pointer-events: none;
      will-change: transform; opacity: 0.2;
    }

    #entrainment-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
      background: white; opacity: 0;
      will-change: opacity; mix-blend-mode: overlay;
    }

    #cloud { position: relative; width: 100vw; height: 100vh; overflow: visible; }

    #ring {
      position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      transform-origin: center center; isolation: isolate; will-change: transform;
      animation: ringRotate 20s linear infinite;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #ring::after {
      content: '';
      position: fixed; top: 50%; left: 50%;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--burst-bg, #000);
      box-shadow: var(--burst-shadow, 0 0 150px #000, 0 0 300px rgba(0,0,0,0.9));
      opacity: 0; pointer-events: none; z-index: 1;
      transform: translate(-50%, -50%) scale(0.1);
      will-change: transform, opacity, box-shadow, background;
      animation: none;
    }
    #ring.active::after {
      animation: ringBurstEnvelope var(--env-dur, 2s) ease-in-out infinite,
                 ringStrobe var(--strobe-dur, 0.5s) step-start infinite;
    }

    @keyframes ringBurstEnvelope {
      0%, 75.37% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
      75.37%      { opacity: 1; transform: translate(-50%, -50%) scale(150); }
      100%        { opacity: 0; transform: translate(-50%, -50%) scale(200); }
    }

    @keyframes ringStrobe {
      0%, 49.9%  { visibility: visible; }
      50%, 99.9% { visibility: hidden; }
      100%       { visibility: visible; }
    }

    .floating-page {
      position: absolute; cursor: pointer; will-change: transform;
      background: transparent; transform-style: preserve-3d;
      backface-visibility: hidden; border-radius: 4px;
    }

    .floating-page canvas {
      display: block; width: 100%; height: 100%; border-radius: 4px;
      background: #000; transform-origin: center center; image-rendering: crisp-edges;
      box-shadow: 0 20px 40px rgba(0,0,0,0.95);
      will-change: transform, box-shadow, opacity;
    }

    .flipper {
      width: 100%; height: 100%; transform-style: preserve-3d;
      transition: transform 0.6s ease-in-out;
    }
    .flipped .flipper { transform: rotateY(180deg); }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      z-index: 1000; display: none; justify-content: center; align-items: center;
      cursor: zoom-out; overflow: visible; pointer-events: auto;
    }

    #glow-wrapper {
      position: relative; display: inline-block; max-width: 95vw; max-height: 95vh;
    }

    #glow-wrapper::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%; background: transparent; pointer-events: none;
      z-index: -2; transform: translate(-50%, -50%);
      will-change: box-shadow, opacity; opacity: 0; transition: opacity 0.2s;
    }
    #glow-wrapper.dream-active::after {
      opacity: var(--sparkle-opacity, 0);
      box-shadow: 0 0 4000px rgba(255,255,255,0.95), 0 0 2400px #fff, 0 0 6000px rgba(255,255,255,0.8);
    }

    #glow-wrapper::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%;
      background: var(--burst-bg, transparent);
      box-shadow: var(--burst-shadow, none);
      pointer-events: none;
      z-index: -1; transform: translate(-50%, -50%);
      will-change: box-shadow, background, opacity;
      opacity: 0; transition: opacity 0.2s;
    }
    #glow-wrapper.dream-active::before {
      opacity: 1;
      animation: glowBurstEnvelope var(--env-dur, 2s) ease-in-out infinite;
    }

    @keyframes glowBurstEnvelope { 0%,75.37%{opacity:0} 75.37%{opacity:1} 100%{opacity:0} }

    #overlay canvas {
      max-width: 95vw; max-height: 95vh; border-radius: 6px;
      cursor: default; background: #000; box-shadow: none;
      position: relative; z-index: 2;
    }

    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #aaa; font-size: 18px; z-index: 10;
    }

    /* ── Fullscreen Invitation ── */
    #fullscreen-invite {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 20%, #1a0d16, #000000);
      z-index: 5000; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      cursor: default; text-align: center;
      user-select: none;
    }
    #atomic-canvas {
      position: absolute;
      width: min(80vw, 80vh);
      height: min(80vw, 80vh);
      pointer-events: none;
      z-index: 1;
      background: transparent;
    }
    .haiku-center {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 2.2rem; letter-spacing: 1px;
      background: transparent; padding: 1.5rem 2rem; border-radius: 20px;
    }
    .invite-line {
      opacity: 0; transition: opacity 1.2s ease; margin: 8px 0;
    }
    .line1 { color: #FFFFFF; --glow-color: rgba(255,255,255,0.9); animation: breatheGlow 3s ease-in-out infinite; }
    .line2 { color: #FFD700; --glow-color: rgba(255,215,0,0.9); animation: breatheGlow 3s ease-in-out infinite 0.5s; }
    .line3 { color: #00FF00; --glow-color: rgba(0,255,0,0.9); animation: breatheGlow 3s ease-in-out infinite 1s; }

    @keyframes breatheGlow {
      0%, 100% { text-shadow: 0 0 8px var(--glow-color), 0 0 16px var(--glow-color), 0 0 32px var(--glow-color); }
      50% { text-shadow: 0 0 16px var(--glow-color), 0 0 32px var(--glow-color), 0 0 64px var(--glow-color); }
    }

    #consent-btn {
      position: relative; z-index: 3; margin-top: 28px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #790B3E 0%, #A62C60 100%);
      color: #000;  /* black text */
      border: none; border-radius: 8px;
      font-family: "Century Gothic", "Apple Gothic", "Gothic", sans-serif;
      font-size: 1.1rem; font-weight: bold; letter-spacing: 1px;
      cursor: pointer; display: none;
      text-transform: uppercase;
      box-shadow: 0 0 15px #790B3E, 0 0 30px rgba(255,215,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: pulseConsent 2s ease-in-out infinite;
    }
    #consent-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #FFD700, 0 0 40px #790B3E;
    }
    @keyframes pulseConsent {
      0%, 100% { box-shadow: 0 0 15px #790B3E, 0 0 30px rgba(255,215,0,0.4); }
      50% { box-shadow: 0 0 25px #FFD700, 0 0 45px #790B3E; }
    }

    /* ── Eye Symbol ── */
    #eye-symbol {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 160px; height: 160px; z-index: 0;
      cursor: pointer; opacity: 0; pointer-events: none;
      filter: drop-shadow(0 0 25px currentColor);
      transition: filter 0.3s;
    }
    #eye-symbol.active { opacity: 1; pointer-events: auto; }
    #eye-symbol svg { display: block; width: 100%; height: 100%; }

    .glow-ring {
      transform-origin: center;
      animation: spinGlow 10s linear infinite;
    }
    @keyframes spinGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <script>
    // ── Atomic Whirl Canvas (stops when gate is dismissed) ──
    (function() {
      const canvas = document.getElementById('atomic-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = 600; canvas.width = size; canvas.height = size;
      const center = { x: size/2, y: size/2 };
      const rings = [
        { a:140, b:92, tilt:0.2, phaseOffset:0.0, lineColor:'rgba(121,11,62,0.7)', textColor:'#D86196', words:6 },
        { a:180, b:125, tilt:0.85, phaseOffset:0.4, lineColor:'rgba(146,30,80,0.65)', textColor:'#E272A4', words:7 },
        { a:220, b:160, tilt:1.45, phaseOffset:0.8, lineColor:'rgba(106,8,52,0.7)', textColor:'#F097B8', words:8 },
        { a:265, b:195, tilt:2.2, phaseOffset:1.2, lineColor:'rgba(160,35,90,0.6)', textColor:'#FFB3D0', words:9 }
      ];
      const DELTA_MS = 2000;
      let animationId = null;
      let lt = 0;

      function ellipsePt(cx,cy,a,b,tilt,ang){
        const xe=a*Math.cos(ang), ye=b*Math.sin(ang), ct=Math.cos(tilt), st=Math.sin(tilt);
        return {x:cx+xe*ct-ye*st, y:cy+xe*st+ye*ct};
      }
      function drawNucleus(){
        const g=ctx.createRadialGradient(center.x,center.y,5,center.x,center.y,32);
        g.addColorStop(0,'#790B3E'); g.addColorStop(0.7,'#A62C60'); g.addColorStop(1,'#F27BAE');
        ctx.beginPath(); ctx.arc(center.x,center.y,18,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      }
      function drawOrbitPath(r){
        ctx.save(); ctx.beginPath();
        ctx.ellipse(center.x,center.y,r.a,r.b,r.tilt,0,Math.PI*2);
        ctx.strokeStyle=r.lineColor; ctx.lineWidth=1.8; ctx.setLineDash([8,12]); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
      }
      function drawRingText(r,now){
        const total=2*Math.PI, count=r.words, angPer=total/count;
        const base=((now%DELTA_MS)/DELTA_MS)*total+r.phaseOffset;
        ctx.save(); ctx.font='13px "Segoe UI",sans-serif'; ctx.fillStyle=r.textColor;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        for(let i=0;i<count;i++){
          const a=base+i*angPer, p=ellipsePt(center.x,center.y,r.a,r.b,r.tilt,a);
          const p2=ellipsePt(center.x,center.y,r.a,r.b,r.tilt,a+0.01);
          const ta=Math.atan2(p2.y-p.y,p2.x-p.x);
          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ta); ctx.fillText('enter',0,0); ctx.restore();
          ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fillStyle=r.textColor; ctx.fill();
        }
        ctx.restore();
      }

      function anim(now){
        if(!lt){lt=now; animationId=requestAnimationFrame(anim); return;}
        let dt=Math.min(0.033,(now-lt)/1000); if(dt<=0) dt=0.016; lt=now;
        ctx.clearRect(0,0,size,size);
        for(let r of rings) drawOrbitPath(r);
        for(let r of rings) drawRingText(r,now);
        drawNucleus();
        animationId = requestAnimationFrame(anim);
      }

      animationId = requestAnimationFrame(anim);

      // Expose stop function
      window.stopAtomicWhirl = function() {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
      };
    })();
  </script>

  <script>
    // ── Haiku display + consent button flow ──
    const invite = document.getElementById('fullscreen-invite');
    const lines = document.querySelectorAll('.invite-line');
    const consentBtn = document.getElementById('consent-btn');
    let currentLine = 0;
    function showNextLine() {
      if (currentLine < lines.length) {
        lines[currentLine].style.opacity = '1';
        currentLine++;
        setTimeout(showNextLine, 1200);
      } else {
        consentBtn.style.display = 'inline-block';
        consentBtn.addEventListener('click', requestFullscreenGate);
      }
    }
  function requestFullscreenGate() {
  consentBtn.removeEventListener('click', requestFullscreenGate);
  // Stop atomic whirl to save resources
  if (window.stopAtomicWhirl) window.stopAtomicWhirl();
  if (document.fullscreenEnabled) {
    document.documentElement.requestFullscreen().then(() => {
      invite.style.display = 'none';
    }).catch(() => { invite.style.display = 'none'; });
  } else {
    invite.style.display = 'none';
  }
  // Activate the eye now that the invitation is dismissed
  document.getElementById('eye-symbol').classList.add('active');
}
    setTimeout(showNextLine, 600);

      const RECEPTIVE = 15000, ALIGNMENT = 10000, ACTION = 12000;
      const CYCLE = RECEPTIVE + ALIGNMENT + ACTION;

      let start = null;
      let carrierPhase = 0, betaPhase = 0;
      let globalPhase = 'receptive', subPhase = 'alpha', freq = 10;

      // Phase colours for all dynamic elements (white → gold → red‑magenta)
      const phaseColors = { receptive: '#FFFFFF', alignment: '#FFD700', action: '#790B3E' };

      // Colour burst tables (ring & PDF glow)
      const colorSteps = {
        receptive: [
          { upTo: 0.7537, bg: '#000', sh: '0 0 150px #000, 0 0 300px rgba(0,0,0,0.9)' },
          { upTo: 0.79475, bg: '#FFFFFF', sh: '0 0 150px #FFFFFF, 0 0 300px rgba(255,255,255,0.9)' },
          { upTo: 0.8358, bg: '#F8F8FF', sh: '0 0 150px #F8F8FF, 0 0 300px rgba(248,248,255,0.9)' },
          { upTo: 0.87685, bg: '#FFFFFF', sh: '0 0 150px #FFFFFF, 0 0 300px rgba(255,255,255,1)' },
          { upTo: 0.9179, bg: '#FFFFFF', sh: '0 0 150px #FFFFFF, 0 0 300px rgba(255,255,255,1)' },
          { upTo: 0.95895, bg: '#FFFFFF', sh: '0 0 150px #FFFFFF, 0 0 300px rgba(255,255,255,0.9)' },
          { upTo: 1.0, bg: '#000', sh: '0 0 150px #000, 0 0 300px rgba(0,0,0,0.9)' }
        ],
        alignment: [
          { upTo: 0.7537, bg: '#000', sh: '0 0 150px #000, 0 0 300px rgba(0,0,0,0.9)' },
          { upTo: 0.79475, bg: '#4A3500', sh: '0 0 150px #4A3500, 0 0 300px rgba(74,53,0,0.9)' },
          { upTo: 0.8358, bg: '#8B6500', sh: '0 0 150px #8B6500, 0 0 300px rgba(139,101,0,0.9)' },
          { upTo: 0.87685, bg: '#DAA520', sh: '0 0 150px #DAA520, 0 0 300px rgba(218,165,32,0.9)' },
          { upTo: 0.9179, bg: '#FFD700', sh: '0 0 150px #FFD700, 0 0 300px rgba(255,215,0,1)' },
          { upTo: 0.95895, bg: '#FFF8DC', sh: '0 0 150px #FFF8DC, 0 0 300px rgba(255,248,220,0.9)' },
          { upTo: 1.0, bg: '#FFFFFF', sh: '0 0 150px #FFFFFF, 0 0 300px rgba(255,255,255,0.9)' }
        ],
        action: [
          { upTo: 0.7537, bg: '#000', sh: '0 0 150px #000, 0 0 300px rgba(0,0,0,0.9)' },
          { upTo: 0.79475, bg: '#0A2A0A', sh: '0 0 150px #0A2A0A, 0 0 300px rgba(10,42,10,0.9)' },
          { upTo: 0.8358, bg: '#1A5A1A', sh: '0 0 150px #1A5A1A, 0 0 300px rgba(26,90,26,0.9)' },
          { upTo: 0.87685, bg: '#2A8A2A', sh: '0 0 150px #2A8A2A, 0 0 300px rgba(42,138,42,0.9)' },
          { upTo: 0.9179, bg: '#40C040', sh: '0 0 150px #40C040, 0 0 300px rgba(64,192,64,0.9)' },
          { upTo: 0.95895, bg: '#60E060', sh: '0 0 150px #60E060, 0 0 300px rgba(96,224,96,0.9)' },
          { upTo: 1.0, bg: '#000', sh: '0 0 150px #000, 0 0 300px rgba(0,0,0,0.9)' }
        ]
      };

      function getBurst(phase, prog) {
        const steps = colorSteps[phase] || colorSteps.receptive;
        for (let i = 0; i < steps.length; i++) if (prog <= steps[i].upTo) return steps[i];
        return steps[steps.length - 1];
      }

      function updatePhase(now) {
        if (!start) return;
        const elapsed = (now - start) % CYCLE;
        if (elapsed < RECEPTIVE) {
          globalPhase = 'receptive';
          if (elapsed < 5000)      { subPhase = 'alpha'; freq = 10; }
          else if (elapsed < 10000) { subPhase = 'theta'; freq = 6; }
          else                     { subPhase = 'delta'; freq = 2; }
        } else if (elapsed < RECEPTIVE + ALIGNMENT) {
          globalPhase = 'alignment'; subPhase = null;
          freq = 0.5;
        } else {
          globalPhase = 'action'; subPhase = null;
          freq = 36;
        }
        window.currentStaticPhase = globalPhase;

        // ══════════════════════════════════════════════════════════
        // ESSENTIAL: Update eye colours every frame
        // All glow rings (outer and inner), sparkles, and the iris
        // reflection use the current phase's sacred colour.
        // Receptive → White, Alignment → Gold, Action → Red‑magenta.
        // ══════════════════════════════════════════════════════════
        const c = phaseColors[globalPhase] || '#FFFFFF';
        eyeSymbol.style.color = c;                     // iris reflection (currentColor)
        document.querySelectorAll('.glow-ring, .inner-glow-ring').forEach(el => el.setAttribute('stroke', c));
        document.querySelectorAll('.sparkle').forEach(el => el.setAttribute('fill', c));
      }

      function applyRingEnvelope() {
        if (globalPhase === 'receptive') {
          ring.style.setProperty('--env-dur','2s'); ring.style.setProperty('--strobe-dur','0.5s');
          glowWrapper.style.setProperty('--env-dur','2s');
        } else if (globalPhase === 'alignment') {
          ring.style.setProperty('--env-dur','5s'); ring.style.setProperty('--strobe-dur','2s');
          glowWrapper.style.setProperty('--env-dur','5s');
        } else {
          ring.style.setProperty('--env-dur','0.5s'); ring.style.setProperty('--strobe-dur','0.0278s');
          glowWrapper.style.setProperty('--env-dur','0.5s');
        }
      }

      let allFloaters = [];
      let spotlights = [];
      let spinAngles = [];
      let flipState = false;

      function loop(now) {
        requestAnimationFrame(loop);
        if (!start) return;

        updatePhase(now);
        applyRingEnvelope();
        ring.classList.add('active');   // ensure burst animation runs

        const dt = Math.min(0.1, (now - (loop.prev || now)) / 1000);
        loop.prev = now;

        carrierPhase = (carrierPhase + 2 * Math.PI * freq * dt) % (2 * Math.PI);

        // Ring & PDF glow colour synchronisation
        const burstDur = globalPhase === 'receptive' ? 2 : (globalPhase === 'alignment' ? 5 : 0.5);
        const burstProg = ((now - start) % (burstDur * 1000)) / (burstDur * 1000);
        const c = getBurst(globalPhase, burstProg);
        ring.style.setProperty('--burst-bg', c.bg);
        ring.style.setProperty('--burst-shadow', c.sh);
        glowWrapper.style.setProperty('--burst-bg', c.bg);
        glowWrapper.style.setProperty('--burst-shadow', '0 0 4000px ' + c.bg + ', 0 0 6000px ' + c.bg);

        // Thumbnail animations
        const spinSpeed = -2 * Math.PI * 0.05;
        const carrierVal = (globalPhase === 'alignment')
          ? (Math.floor(now / 1000) % 2 === 0 ? 1 : 0)
          : (subPhase === 'delta')
            ? (0.5 + 0.5 * Math.sin(carrierPhase))
            : (Math.sin(carrierPhase) >= 0 ? 1 : 0);

        let spotColor = '#FFFFFF', pulseColor = '#FFFFFF';
        if (globalPhase === 'alignment') { spotColor = '#FFD700'; pulseColor = '#FFD700'; }
        else if (globalPhase === 'action') { spotColor = '#00FF00'; pulseColor = '#00FF00'; }

        for (let i = 0; i < allFloaters.length; i++) {
          const fl = allFloaters[i];
          const canv = fl.element.querySelector('canvas');
          if (!canv) continue;

          spinAngles[i] = (spinAngles[i] || 0) + spinSpeed * dt;
          canv.style.transform = `rotate(${spinAngles[i] % (2 * Math.PI)}rad)`;

          const pulseOn = carrierVal >= 0.5;
          let pulseShadow = pulseOn
            ? `0 20px 40px rgba(0,0,0,1), 0 0 80px ${pulseColor}, 0 0 150px ${pulseColor}`
            : '0 20px 40px rgba(0,0,0,1), 0 0 80px #000, 0 0 150px rgba(0,0,0,0.95)';

          if (spotlights.includes(i)) {
            pulseShadow = pulseOn
              ? `0 20px 40px rgba(0,0,0,1), 0 0 120px ${spotColor}, 0 0 225px ${spotColor}`
              : `0 20px 40px rgba(0,0,0,1), 0 0 120px #000, 0 0 225px rgba(0,0,0,0.8)`;
          }

          if (fl.element.classList.contains('color-pass')) {
            pulseShadow = pulseOn
              ? `0 20px 40px rgba(0,0,0,1), 0 0 100px ${pulseColor}, 0 0 200px ${pulseColor}`
              : `0 20px 40px rgba(0,0,0,1), 0 0 100px #000, 0 0 200px rgba(0,0,0,0.4)`;
          }

          canv.style.boxShadow = pulseShadow;
          canv.style.opacity = carrierVal >= 0.5 ? 1 : 0.75;
        }

        // Paper‑flip ritual (0.5 Hz)
        const flipPeriod = 2000;
        const flipPhase = ((now - start) % flipPeriod) / flipPeriod;
        const shouldFlip = flipPhase < 0.5;

        if (shouldFlip && !flipState) {
          allFloaters.forEach(item => item.element.classList.add('flipped'));
          flipState = true;
        } else if (!shouldFlip && flipState) {
          allFloaters.forEach(item => item.element.classList.remove('flipped'));
          flipState = false;
        }

        // Luminance overlay (photic entrainment)
        const infra = 0.5 + 0.5 * Math.sin(2 * Math.PI * now / 20000);
        let opacity = 0;
        if (globalPhase === 'receptive') {
          opacity = carrierVal * infra * 0.35;
        } else if (globalPhase === 'alignment') {
          opacity = carrierVal * infra * 0.25;
        } else {
          betaPhase = (betaPhase + 2 * Math.PI * 18 * dt) % (2 * Math.PI);
          const betaEnv = 0.5 + 0.5 * Math.sin(betaPhase);
          const gammaFlicker = Math.sin(carrierPhase) >= 0 ? 1 : 0;
          opacity = gammaFlicker * betaEnv * infra * 0.35;
        }
        overlay.style.opacity = opacity;
      }
      loop.prev = performance.now();

      window.initThumbnails = function(floaterList, spotIdx, totalCopies, staggerDelay) {
        allFloaters = floaterList;
        spotlights = spotIdx;
        spinAngles = new Array(floaterList.length).fill(0);

        const emergenceMs = totalCopies * staggerDelay + 500;
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          start = performance.now();   // ritual begins now
        }, emergenceMs);
      };

      requestAnimationFrame(loop);
    })();

    // ── Background static canvas (Web Worker) ──
    (function() {
      const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
      let currentPhase = 'receptive';
      let last = 0, fps = 10, iv = 1000/fps, wkr, pending = false;

      function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }

      function createWorker() {
        const code = () => {
          self.onmessage = e => {
            const { w, h, palette, isTvStatic } = e.data;
            const sz = w * h * 4, buf = new ArrayBuffer(sz);
            const d = new Uint8ClampedArray(buf);
            if (isTvStatic) {
              for (let i = 0; i < sz; i += 4) {
                d[i] = Math.random() * 256 | 0;
                d[i+1] = Math.random() * 256 | 0;
                d[i+2] = Math.random() * 256 | 0;
                d[i+3] = 255;
              }
            } else {
              for (let i = 0; i < sz; i += 4) {
                const c = palette[Math.random() * palette.length | 0];
                d[i] = c.r; d[i+1] = c.g; d[i+2] = c.b; d[i+3] = 255;
              }
            }
            self.postMessage({ buf }, [buf]);
          };
        };
        const blob = new Blob([`(${code.toString()})()`], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const w = new Worker(url); URL.revokeObjectURL(url); return w;
      }

      function requestFrame() {
        if (wkr && !pending) {
          pending = true;
          if (currentPhase === 'receptive') {
            wkr.postMessage({ w: canvas.width, h: canvas.height, isTvStatic: true });
          } else {
            const hexPal = currentPhase === 'alignment'
              ? ['#4a3500','#6b4e00','#8b6500','#b8860b','#daa520','#ffd700','#fff8dc','#f0e68c','#d2b48c','#b8860b']
              : ['#0a1f0a','#143014','#1e3b1e','#284b28','#326032','#3c783c','#2d5a2d','#1f3f1f','#4a7a4a','#60a060'];
            const numPal = hexPal.map(h => ({
              r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16)
            }));
            wkr.postMessage({ w: canvas.width, h: canvas.height, palette: numPal, isTvStatic: false });
          }
        }
      }

      function generateMainThread() {
        const img = ctx.createImageData(canvas.width, canvas.height), d = img.data;
        if (currentPhase === 'receptive') {
          for (let i = 0; i < d.length; i += 4) {
            d[i] = Math.random() * 256 | 0;
            d[i+1] = Math.random() * 256 | 0;
            d[i+2] = Math.random() * 256 | 0;
            d[i+3] = 255;
          }
        } else {
          const hexPal = currentPhase === 'alignment'
            ? ['#4a3500','#6b4e00','#8b6500','#b8860b','#daa520','#ffd700','#fff8dc','#f0e68c','#d2b48c','#b8860b']
            : ['#0a1f0a','#143014','#1e3b1e','#284b28','#326032','#3c783c','#2d5a2d','#1f3f1f','#4a7a4a','#60a060'];
          const numPal = hexPal.map(h => ({
            r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16)
          }));
          for (let i = 0; i < d.length; i += 4) {
            const c = numPal[Math.random() * numPal.length | 0];
            d[i] = c.r; d[i+1] = c.g; d[i+2] = c.b; d[i+3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
      }

      function onWorkerMsg(e) {
        const img = new ImageData(new Uint8ClampedArray(e.data.buf), canvas.width, canvas.height);
        ctx.putImageData(img, 0, 0);
        pending = false;
      }

      try { wkr = createWorker(); wkr.onmessage = onWorkerMsg; wkr.onerror = () => { wkr = null; }; } catch (e) { wkr = null; }

      function tick(now) {
        requestAnimationFrame(tick);
        if (window.currentStaticPhase) currentPhase = window.currentStaticPhase;
        iv = 1000 / fps;
        if (now - last >= iv) {
          last = now;
          wkr ? requestFrame() : generateMainThread();
        }
      }

      addEventListener('resize', resize);
      resize();
      requestAnimationFrame(tick);
    })();

    // ═══════════════════════════════════════════════════════════════
    // ESSENTIAL: PDF.js – thumbnail creation, spiral layering,
    // colour‑pass sweep, and PDF open/close handling.
    // ═══════════════════════════════════════════════════════════════
    (async function() {
      function wait(cb) { typeof pdfjsLib !== 'undefined' ? cb() : setTimeout(() => wait(cb), 50); }
      wait(async () => {
        pdfjsLib.GlobalWorkerOptions.workerSrc = window.PDFJS_LOCAL
          ? '/pdfjs/build/pdf.worker.min.js'
          : 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument('/pdf/resume.pdf').promise;
        const pages = pdf.numPages;

        const ringEl = document.getElementById('ring');
        const overlay = document.getElementById('overlay');
        const glow = document.getElementById('glow-wrapper');
        const expC = document.getElementById('expanded-canvas');

        const COPIES = 22, SCALE = 0.35, STAGGER = 167;
        const pageData = [], allFloaters = [];
        const spotIdx = [10, 21];
        const spotSet = new Set(spotIdx);

        function posOnCircle(el, idx, total, w, h) {
          const angle = idx / total * 2 * Math.PI - Math.PI / 2 - (total - 1) / total * 2 * Math.PI;
          const radius = Math.min(innerWidth, innerHeight) * 0.4;
          el.style.left = (Math.cos(angle) * radius - w / 2) + 'px';
          el.style.top  = (Math.sin(angle) * radius - h / 2) + 'px';
        }

        for (let p = 1; p <= pages; p++) {
          const page = await pdf.getPage(p);
          const vp = page.getViewport({ scale: SCALE }), orig = page.getViewport({ scale: 2.0 });
          const tc = document.createElement('canvas'); tc.width = vp.width; tc.height = vp.height;
          await page.render({ canvasContext: tc.getContext('2d'), viewport: vp }).promise;
          pageData[p] = { page, viewport: orig, thumbCanvas: tc, thumbWidth: vp.width, thumbHeight: vp.height };
        }

        let idx = 0, totalCopies = pages * COPIES;
        for (let p = 1; p <= pages; p++) {
          const { thumbCanvas, thumbWidth, thumbHeight } = pageData[p];
          for (let c = 0; c < COPIES; c++) {
            const floater = document.createElement('div'); floater.className = 'floating-page';
            const cc = document.createElement('canvas'); cc.width = thumbWidth; cc.height = thumbHeight;
            cc.getContext('2d').drawImage(thumbCanvas, 0, 0);
            const flipper = document.createElement('div'); flipper.className = 'flipper';
            flipper.appendChild(cc); floater.appendChild(flipper);
            floater.style.width = thumbWidth + 'px'; floater.style.height = thumbHeight + 'px';
            floater.style.left = '-9999px'; floater.style.top = '-9999px';
            const rx = (Math.random() - 0.5) * 8, ry = (Math.random() - 0.5) * 8, rz = (Math.random() - 0.5) * 6;
            floater.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg) translateZ(${Math.random() * 30}px)`;
            floater.dataset.page = p; floater.dataset.index = idx;

            let z = 10;
            if (idx < 11) z = 20 + idx;
            else z = 30 + (idx - 11);
            floater.style.zIndex = z;
            if (idx === 11) floater.style.zIndex = 25;
            if (spotSet.has(idx)) floater.style.zIndex = 200;

            floater.addEventListener('click', async (e) => {
              e.stopPropagation();
              const { page, viewport } = pageData[parseInt(floater.dataset.page)];
              expC.width = viewport.width; expC.height = viewport.height;
              const ctx = expC.getContext('2d');
              await page.render({ canvasContext: ctx, viewport }).promise;
              overlay.style.display = 'flex';
              glow.classList.add('dream-active');
              // ═══════════════════════════════════════════════════════
              // ESSENTIAL: PDF aura synchronisation
              // The PDF aura (glow‑wrapper pseudo‑elements) immediately
              // matches the ring’s colour burst because both sample the
              // same getBurst() table and share the same envelope duration.
              // The opened PDF’s aura is never out‑of‑sync with the ritual.
              // The master clock keeps running; the aura’s colour, timing,
              // and intensity are identical to the ring’s at the moment
              // the PDF is opened.  The PDF canvas itself is never
              // flickered – only the aura carries the entrainment signal.
              // Closing the PDF simply removes the dream‑active class,
              // and the ring ritual continues uninterrupted.
              // ═══════════════════════════════════════════════════════
            });

            ringEl.appendChild(floater);
            allFloaters.push({ element: floater, flipper, index: idx, width: thumbWidth, height: thumbHeight });
            setTimeout((el, i, w, h) => posOnCircle(el, i, totalCopies, w, h), idx * STAGGER, floater, idx, thumbWidth, thumbHeight);
            idx++;
          }
        }

        const eligible = allFloaters.map((_, i) => i).filter(i => !spotSet.has(i));
        const sizes = [2, 4, 5]; let gi = 0, pos = 0;
        function applyColorPass() {
          eligible.forEach(i => allFloaters[i].element.classList.remove('color-pass'));
          const sz = sizes[gi], grp = [];
          for (let i = 0; i < sz; i++) grp.push(eligible[(pos + i) % eligible.length]);
          grp.forEach(i => allFloaters[i].element.classList.add('color-pass'));
          pos = (pos + sz) % eligible.length; gi = (gi + 1) % sizes.length;
        }
        setTimeout(() => { applyColorPass(); setInterval(applyColorPass, 8000); }, totalCopies * STAGGER + 2000);

        window.initThumbnails(allFloaters, spotIdx, totalCopies, STAGGER);

        // ═══════════════════════════════════════════════════════════════
        // ESSENTIAL: Eye symbol click – uses identical PDF‑opening logic
        // as the thumbnails, ensuring perfect synchronisation.
        // ═══════════════════════════════════════════════════════════════
        const eyeEl = document.getElementById('eye-symbol');
        if (eyeEl) {
          eyeEl.addEventListener('click', async () => {
            if (!allFloaters.length) return;
            // Open the first page (or any page) – can be customised later
            const { page, viewport } = pageData[1];
            expC.width = viewport.width; expC.height = viewport.height;
            const ctx = expC.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            overlay.style.display = 'flex';
            glow.classList.add('dream-active');
          });
        }

        addEventListener('resize', () => allFloaters.forEach(({ element, index, width, height }) => posOnCircle(element, index, totalCopies, width, height)));
        overlay.addEventListener('click', () => { overlay.style.display = 'none'; glow.classList.remove('dream-active'); });
        expC.addEventListener('click', e => e.stopPropagation());
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { overlay.style.display = 'none'; glow.classList.remove('dream-active'); } });
      });
    })();
  </script>
</body>
