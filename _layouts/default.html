<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dark Mode Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0b0b; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    .download-fallback {
      position: fixed;
      bottom: 16px;
      right: 20px;
      z-index: 9999999;
      background: #0d1117;
      padding: 8px 16px;
      border-radius: 6px;
      opacity: 0.65;
      border: 1px solid #30363d;
      backdrop-filter: blur(4px);
      transition: opacity 0.2s ease;
    }
    .download-fallback:hover { opacity: 1; }
    .download-fallback a {
      color: #c9d1d9;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <iframe src="{{ '/pdfjs/web/viewer.html?file=' | append: '/pdf/resume.pdf' | relative_url }}"
          title="Dark Mode Resume" allowfullscreen>
  </iframe>
  <div class="download-fallback">
    <a href="{{ '/pdf/resume.pdf' | relative_url }}" download>⬇ Download PDF</a>
  </div>
</body>
</html>
