<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      /* Override theme: hide all header/footer elements */
      body > header,
      body > footer,
      #downloads,
      .btn-github,
      h1, h2, h3, h4, h5, h6,
      .container > section#main_content {
        display: none !important;
      }

      /* Ensure full‑screen dark embed */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0b0b; }

      /* The iframe fills everything */
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: #0b0b0b;
      }

      /* Subtle download fallback (only visible element besides PDF) */
      .download-fallback {
        position: fixed;
        bottom: 16px;
        right: 20px;
        z-index: 9999999;
        background: #0d1117;
        padding: 8px 16px;
        border-radius: 6px;
        opacity: 0.55;
        border: 1px solid #30363d;
        backdrop-filter: blur(4px);
        transition: opacity 0.2s ease;
      }
      .download-fallback:hover { opacity: 1; }
      .download-fallback a {
        color: #c9d1d9;
        text-decoration: none;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <!-- Full‑screen PDF.js viewer -->
    <iframe src="/pdfjs/web/viewer.html?file=../pdf/resume.pdf"
            title="Resume"
            allowfullscreen>
    </iframe>

    <!-- Only visible text on the page -->
    <div class="download-fallback">
      <a href="{{ '/pdf/resume.pdf' | relative_url }}" download>⬇ Download PDF</a>
    </div>
  </body>
</html>
