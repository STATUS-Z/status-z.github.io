<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      .pdf-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        background: #000;
        z-index: 999999;
      }
      .pdf-container embed,
      .pdf-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: #000;
      }
      .download-fallback {
        position: fixed;
        bottom: 16px;
        right: 20px;
        z-index: 9999999;
        background: #0d1117;
        padding: 8px 16px;
        border-radius: 6px;
        opacity: 0.65;
        border: 1px solid #30363d;
        backdrop-filter: blur(4px);
        transition: opacity 0.2s ease;
      }
      .download-fallback:hover {
        opacity: 1;
      }
      .download-fallback a {
        color: #c9d1d9;
        text-decoration: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <div class="pdf-container">
      <!-- 
        Use embed with PDF viewer parameters:
        #toolbar=0&navpanes=0&scrollbar=0 – hides UI in Chrome/Edge
        #view=FitH – fits horizontal width
      -->
      <embed 
        src="{{ '/pdf/resume.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH' | relative_url }}" 
        type="application/pdf" 
      />
    </div>
    <div class="download-fallback">
      <a href="{{ '/pdf/resume.pdf' | relative_url }}" download>⬇ Download PDF</a>
    </div>
  </body>
</html>
