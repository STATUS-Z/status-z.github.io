<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #151515; }
      iframe { width: 100%; height: 100%; border: none; display: block; filter: invert(1) hue-rotate(180deg); }
      .download-fallback { /* ... keep existing style ... */ }
    </style>
  </head>
  <body>
    <iframe src="https://docs.google.com/viewer?url={{ site.url }}{{ '/pdf/resume.pdf' | relative_url }}&embedded=true"
            title="Dark Mode Resume" allowfullscreen>
    </iframe>
    <div class="download-fallback">
      <a href="{{ '/pdf/resume.pdf' | relative_url }}" download>⬇ Download PDF</a>
    </div>
  </body>
</html>
